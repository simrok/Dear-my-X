version: "3.9"

# Dear my X — 로컬 개발용 컴포즈
# 사용법:
#   docker compose up -d db        # DB 만 띄우고 서버는 로컬에서 실행
#   docker compose up              # 전체 (db + server) 실행
#
# 주의:
#   - 모바일 (Expo) 는 호스트에서 별도 실행합니다 (`pnpm mobile:start`).

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dear-my-x-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dear_my_x}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dear_my_x_pw}
      POSTGRES_DB: ${POSTGRES_DB:-dear_my_x}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dear_my_x} -d ${POSTGRES_DB:-dear_my_x}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: dear-my-x-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./apps/server/.env
    environment:
      # docker 네트워크 내부에서는 호스트 이름이 'db'
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dear_my_x}:${POSTGRES_PASSWORD:-dear_my_x_pw}@db:5432/${POSTGRES_DB:-dear_my_x}
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - ./apps/server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres-data:
